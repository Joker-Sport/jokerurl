<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOKER URL</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Cairo",sans-serif;
background:linear-gradient(135deg,#020617,#0f172a,#020617);
color:white;
text-align:center;
}

.container{
max-width:950px;
margin:auto;
padding:20px;
}

h1{
font-size:34px;
margin:10px 0;
background:linear-gradient(90deg,#38bdf8,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:14px;
padding:25px;
margin-top:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(56,189,248,0.1);
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#38bdf8,#22c55e);
color:white;
cursor:pointer;
font-size:14px;
}

.copy-row{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin-top:12px;
flex-wrap:wrap;
}

.copy-row label{
min-width:130px;
font-weight:bold;
text-align:right;
}

.copy-row input{
padding:10px;
border-radius:8px;
border:none;
width:260px;
background:#020617;
color:white;
}

.lang-box{
position:absolute;
top:15px;
right:15px;
}

.copy-msg{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#22c55e;
padding:10px 20px;
border-radius:8px;
display:none;
font-weight:bold;
}

</style>

<script>

function switchLang(lang){
document.getElementById("ar").style.display = lang==="ar"?"block":"none";
document.getElementById("en").style.display = lang==="en"?"block":"none";
}

function showMsg(){
let msg=document.getElementById("copyMsg");
msg.style.display="block";
setTimeout(()=>{msg.style.display="none";},1500);
}

function copyText(id){
let text=document.getElementById(id).value;
navigator.clipboard.writeText(text);
showMsg();
}

</script>

</head>

<body>

<div class="lang-box">
<button onclick="switchLang('ar')">العربية</button>
<button onclick="switchLang('en')">English</button>
</div>

<div class="container">

<!-- Arabic -->
<div id="ar">

<h1>JOKER URL</h1>

<div class="card">
<h2>بيانات التشغيل</h2>

<div class="copy-row">
<label>رابط API</label> 
<input id="url_ar" value="https://joker.com" readonly>
<button onclick="copyText('url_ar')">نسخ</button>
</div>

<div class="copy-row">
<label>اسم المستخدم</label>
<input id="user_ar" value="joker" readonly>
<button onclick="copyText('user_ar')">نسخ</button>
</div>

<div class="copy-row">
<label>كلمة المرور</label>
<input id="pass_ar" value="joker" readonly>
<button onclick="copyText('pass_ar')">نسخ</button>
</div>

</div>

</div>

<!-- English -->
<div id="en" style="display:none">

<h1>JOKER URL</h1>

<div class="card">
<h2>Login Details</h2>

<div class="copy-row">
<label>API URL</label>  
<input id="url_en" value="https://joker.com" readonly>
<button onclick="copyText('url_en')">Copy</button>
</div>

<div class="copy-row">
<label>Username</label> 
<input id="user_en" value="joker" readonly>
<button onclick="copyText('user_en')">Copy</button>
</div>

<div class="copy-row">
<label>Password</label> 
<input id="pass_en" value="joker" readonly>
<button onclick="copyText('pass_en')">Copy</button>
</div>

</div>

</div>

</div>

<!-- رسالة النسخ -->
<div class="copy-msg" id="copyMsg">تم النسخ</div>

</body>
</html>
